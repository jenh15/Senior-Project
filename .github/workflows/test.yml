name: Backend Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Install development / test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        env:
          # Dummy values — no live API calls are made in unit tests
          OPENAI_API_KEY: test-key-for-ci
          MAX_SPECIES_FOR_AI: "3"
          TURNSTILE_SECRET_KEY: test-turnstile-key
          MAPTILER_API_KEY: test-maptiler-key
          FRONTEND_ORIGIN: http://localhost:5173
          REDIS_URL: redis://localhost:6379
        run: pytest tests/ -m "not integration"

      - name: Upload coverage report (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
